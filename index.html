<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,100,0,0&icon_names=list_alt" />
    <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css?family=Syncopate|Rubik"
    />
    <link rel="stylesheet" type="text/css" href="index.css" />
  <title>Todo Javascript DaisyUI</title>
</head>

<body data-theme="coffee" class="min-h-screen bg-autumn">
  <div class="navbar bg-base-100 shadow-sm">
    <div class="flex-1">
      <a class="btn btn-ghost text-xl">Daisy To Do</a>
    </div>
    <div class="flex gap-2">
      <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
      <div class="dropdown dropdown-end">
        <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar">
          <div class="w-10 rounded-full">
            <img
              alt="Tailwind CSS Navbar component"
              src="https://img.daisyui.com/images/stock/photo-1534528741775-53994a69daeb.webp" />
          </div>
        </div>
        <ul
          tabindex="0"
          class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
          <li>
            <a class="justify-between">
              Profile
              <span class="badge">New</span>
            </a>
          </li>
          <li><a>Settings</a></li>
          <li><a>Logout</a></li>
        </ul>
      </div>
    </div>
  </div>


  <!-- name of each tab group should be unique -->
<div class="tabs tabs-lift px-28 py-16">
  <label class="tab">
    <input type="radio" name="todo-list-tabs" checked="checked" />
    <span class="material-symbols-outlined me-2 opacity-80">
      list_alt
      </span>
    To Do List
  </label>
  <div class="tab-content bg-base-100 border-base-300 p-6">
    <fieldset class="fieldset">
      <legend class="fieldset-legend">Add a new task:</legend>
      <div class="flex gap-x-4">
        <input id="add-task-text" type="text" class="input bg-neutral" placeholder="What to do..." />
        <label class="select bg-neutral">
          <span class="label opacity-">Priority Level</span>
          <select id="add-task-priority" class="">
            <!-- <option value="" selected disabled class="text-opacity-50">Select priority</option> -->
            <option value="Low" class="bg-info text-neutral hover:text-neutral-content">Low</option>
            <option value="Normal" class="bg-success text-neutral hover:text-neutral-content" selected>Normal</option>
            <option value="High" class="bg-warning text-neutral hover:text-neutral-content">High</option>
            <option value="Urgent" class="bg-error text-neutral hover:text-neutral-content">Urgent</option>
          </select>
        </label>
        <button onclick="handleAddTask()" id="add-task-button" class="btn btn-dash btn-info" disabled>Add Task</button>
        <button class="btn btn-soft btn-warning">Cancel</button>
      </div>
    </fieldset>

    <div class="p-4 pb-2 text-sm tracking-wide uppercase mt-8">Tasks</div>
    <ul id="list-container" class="list bg-base-200 rounded-box shadow-md">
    </ul>
  </div>

  <label class="tab">
    <input type="radio" name="todo-list-tabs" />
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-4 me-2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.182 15.182a4.5 4.5 0 0 1-6.364 0M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0ZM9.75 9.75c0 .414-.168.75-.375.75S9 10.164 9 9.75 9.168 9 9.375 9s.375.336.375.75Zm-.375 0h.008v.015h-.008V9.75Zm5.625 0c0 .414-.168.75-.375.75s-.375-.336-.375-.75.168-.75.375-.75.375.336.375.75Zm-.375 0h.008v.015h-.008V9.75Z" /></svg>
    <!-- Completed Tasks -->
     Completed
  </label>
  <div class="tab-content bg-base-100 border-base-300 p-6">
    <div class="p-4 pb-2 text-sm tracking-wide uppercase mt-8">Completed Tasks</div>
    <ul id="completed-tasks-container" class="list bg-base-200 rounded-box shadow-md">
    </ul>
  </div>

  <label class="tab">
    <input type="radio" name="todo-list-tabs" />
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-4 me-2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" /></svg>
    Notes
  </label>
  <div class="tab-content bg-base-100 border-base-300 p-6">
    Tab content 3
  </div>

  <label class="tab">
    <input type="radio" name="todo-list-tabs" />
    Urgent
  </label>
  <div class="tab-content bg-base-100 border-base-300 p-6">
    Urgent List
  </div>

  <label class="tab">
    <input type="radio" name="todo-list-tabs" />
    High
  </label>
  <div class="tab-content bg-base-100 border-base-300 p-6">
    High
  </div>

  <label class="tab">
    <input type="radio" name="todo-list-tabs" />
    Normal
  </label>
  <div class="tab-content bg-base-100 border-base-300 p-6">
    Normal
  </div>

  <label class="tab">
    <input type="radio" name="todo-list-tabs" />
    Low
  </label>
  <div class="tab-content bg-base-100 border-base-300 p-6">
    Low
  </div>

</div>
  <script src="index.js" type="text/javascript"></script>
</body>
</html>
